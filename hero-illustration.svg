<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" width="560" height="480" role="img" aria-label="Friendly tax filing illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
  </defs>

  <!-- background blob -->
  <ellipse cx="280" cy="260" rx="240" ry="200" fill="url(#bg)"/>

  <!-- back document -->
  <g transform="translate(80 80) rotate(-6)">
    <rect width="240" height="300" rx="16" fill="#fff" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="24" y="32" width="160" height="14" rx="7" fill="#5EEAD4"/>
    <rect x="24" y="60" width="192" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="24" y="78" width="160" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="24" y="96" width="180" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="24" y="124" width="80" height="40" rx="8" fill="#ECFDF5" stroke="#0F766E" stroke-width="1.5"/>
    <text x="64" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0F766E">T1</text>
    <rect x="120" y="124" width="96" height="40" rx="8" fill="#F1F5F9"/>
    <rect x="24" y="180" width="192" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="24" y="198" width="120" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="24" y="226" width="192" height="48" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>

  <!-- front card with checkmark -->
  <g transform="translate(220 130)">
    <rect width="280" height="260" rx="20" fill="url(#card)" stroke="#E2E8F0" stroke-width="2"/>
    <!-- header bar -->
    <rect x="0" y="0" width="280" height="56" rx="20" fill="#0F766E"/>
    <rect x="0" y="36" width="280" height="20" fill="#0F766E"/>
    <circle cx="28" cy="28" r="10" fill="#5EEAD4"/>
    <rect x="48" y="22" width="100" height="6" rx="3" fill="#5EEAD4" opacity="0.7"/>
    <rect x="48" y="34" width="64" height="5" rx="2.5" fill="#FFFFFF" opacity="0.6"/>

    <!-- big check -->
    <circle cx="140" cy="150" r="58" fill="#ECFDF5" stroke="#0F766E" stroke-width="3"/>
    <path d="M115 150 l18 18 l32 -36" fill="none" stroke="#0F766E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="56" y="226" width="168" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="86" y="244" width="108" height="6" rx="3" fill="#E2E8F0"/>
  </g>

  <!-- floating coins / refund hints -->
  <g transform="translate(440 90)">
    <circle r="22" fill="#FCD34D" stroke="#F59E0B" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#92400E">$</text>
  </g>
  <g transform="translate(120 380)">
    <circle r="18" fill="#FCD34D" stroke="#F59E0B" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#92400E">$</text>
  </g>
  <g transform="translate(490 320)">
    <circle r="14" fill="#FCD34D" stroke="#F59E0B" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#92400E">$</text>
  </g>

  <!-- sparkles -->
  <g fill="#5EEAD4">
    <path d="M70 200 l4 -10 l4 10 l10 4 l-10 4 l-4 10 l-4 -10 l-10 -4 z"/>
    <path d="M510 220 l3 -8 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 z"/>
    <path d="M380 60 l3 -7 l3 7 l7 3 l-7 3 l-3 7 l-3 -7 l-7 -3 z"/>
  </g>
</svg>
